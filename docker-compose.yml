services:
  postgres:
    image: postgres:17-alpine

    container_name: mediavault-db

    environment:
      POSTGRES_DB: mediavault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d mediavault"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    restart: unless-stopped
  
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    
    container_name: mediavault-api

    env_file:
      - .env
    
    depends_on:
      postgres:
        condition: service_healthy
    
    volumes:
      - .:/app
      - /media/sf_Movies:/app/media_dir:ro
    
    restart: unless-stopped
  
  nginx:
    build:
      context: .
      dockerfile: client/Dockerfile
    
    ports:
      - "80:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    depends_on:
      - backend
    
    restart: unless-stopped

volumes:
  postgres_data: